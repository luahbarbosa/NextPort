<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexPort - Alterar Senha</title>
  <link rel="stylesheet" href="src/css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="src/images/nexport-logo.svg" alt="NexPort" class="sidebar-brand-image" />
      </div>
      <nav class="sidebar-menu">
        <ul class="menu-list">
          <li class="menu-item"><a href="index.html" class="menu-link"><i class="ph ph-gauge"></i><span>Gerenciamento Central</span></a></li>
          <li class="menu-item"><a href="dispositivos.html" class="menu-link"><i class="ph ph-device-tablet"></i><span>Dispositivos</span></a></li>
          <li class="menu-item"><a href="moradores.html" class="menu-link"><i class="ph ph-users"></i><span>Moradores</span></a></li>
          <li class="menu-item"><a href="funcionarios.html" class="menu-link"><i class="ph ph-identification-card"></i><span>Funcionários</span></a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div class="header-left">
          <h1 class="page-title">Alterar Senha</h1>
          <p class="page-subtitle">Defina uma nova senha para proteger sua conta.</p>
        </div>
        <div class="header-right">
          <details class="profile-menu profile-loading">
            <summary class="profile-trigger">
              <span class="profile-avatar">&nbsp;</span>
              <span class="profile-text">
                <strong>&nbsp;</strong>
                <small>&nbsp;</small>
              </span>
              <i class="ph ph-caret-down"></i>
            </summary>
            <div class="profile-dropdown">
              <a href="perfil.html" class="profile-action"><i class="ph ph-user-circle"></i><span>Meu Perfil</span></a>
              <a href="senha.html" class="profile-action"><i class="ph ph-lock-key"></i><span>Alterar Senha</span></a>
              <a href="#" id="logout-link" class="profile-action profile-action-logout"><i class="ph ph-sign-out"></i><span>Sair</span></a>
            </div>
          </details>
        </div>
      </header>

      <div class="content-scroll">
        <section class="profile-card">
          <h2>Atualizar senha</h2>
          <p>Preencha os campos abaixo para redefinir sua senha.</p>
          <form id="password-form" class="profile-form">
            <div class="input-group profile-input-group">
              <label for="current-password">Senha atual</label>
              <input type="password" id="current-password" name="current-password" required />
            </div>
            <div class="input-group profile-input-group">
              <label for="new-password">Nova senha</label>
              <input type="password" id="new-password" name="new-password" required />
            </div>
            <div class="input-group profile-input-group">
              <label for="confirm-password">Confirmar nova senha</label>
              <input type="password" id="confirm-password" name="confirm-password" required />
            </div>
            <div class="profile-actions">
              <button type="submit" class="btn btn-primary">Alterar Senha</button>
            </div>
            <p id="password-message" class="form-message" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="src/js/config.js"></script>
  <script type="module" src="src/js/auth.js"></script>
  <script type="module" src="src/js/protected-route.js"></script>
  <script type="module" src="src/js/profile-menu.js"></script>
  <script type="module" src="src/js/password.js"></script>
</body>
</html>
