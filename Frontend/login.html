<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexPort - Login</title>
  <link rel="stylesheet" href="src/css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="src/images/nexport-logo-dark.svg" alt="NexPort" class="auth-brand-image" />
      </div>
      <h1>Entrar no NexPort</h1>
      <p>Acesse o painel administrativo.</p>
      <form id="login-form" class="auth-form">
        <div class="input-group profile-input-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" name="login-email" required />
        </div>
        <div class="input-group profile-input-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" name="login-password" required />
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Entrar</button>
        <p id="login-message" class="form-message" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <script type="module" src="src/js/config.js"></script>
  <script type="module" src="src/js/auth.js"></script>
  <script type="module" src="src/js/login.js"></script>
</body>
</html>
